name: Deploy Staging

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          npm ci
          npm run build
      # Add your deployment step here (Vercel, Railway, VPS, etc.)
      - name: Notify deployment
        run: echo "Deployed to staging!"
