<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="gm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D6B065"/>
      <stop offset="50%" stop-color="#C99A3E"/>
      <stop offset="100%" stop-color="#A17823"/>
    </linearGradient>
    <linearGradient id="pd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C4DB8"/>
      <stop offset="50%" stop-color="#6A3D9A"/>
      <stop offset="100%" stop-color="#4B2673"/>
    </linearGradient>
    <linearGradient id="pb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6A3D9A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9933FF" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#9933FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#9933FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="6" flood-color="#0A0415" flood-opacity="0.6"/>
    </filter>
    <filter id="depth" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="1.5" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Glow -->
  <ellipse cx="120" cy="120" rx="95" ry="80" fill="url(#glow)"/>

  <!-- Mark -->
  <g filter="url(#sh)" transform="translate(40, 25)">
    <!-- Outer hex segments -->
    <polygon points="80,8 153,43 133,73 80,53" fill="url(#pd)" filter="url(#depth)"/>
    <polygon points="80,53 133,73 133,143 80,163 27,123 27,43" fill="url(#gm)" filter="url(#depth)"/>
    <polygon points="133,73 153,43 153,123 133,143" fill="url(#pd)" filter="url(#depth)"/>

    <!-- Gap lines -->
    <line x1="80" y1="8" x2="80" y2="53" stroke="#050510" stroke-width="2"/>
    <line x1="80" y1="53" x2="133" y2="73" stroke="#050510" stroke-width="2"/>
    <line x1="133" y1="73" x2="133" y2="143" stroke="#050510" stroke-width="1.5"/>

    <!-- Inner hex outline -->
    <polygon points="80,22 143,55 143,118 80,150 17,118 17,55" 
      fill="none" stroke="#D4A843" stroke-width="1" opacity="0.4"/>

    <!-- Rivets -->
    <circle cx="80" cy="22" r="2" fill="#D4A843" opacity="0.5"/>
    <circle cx="143" cy="55" r="2" fill="#D4A843" opacity="0.5"/>
    <circle cx="143" cy="118" r="2" fill="#D4A843" opacity="0.5"/>
    <circle cx="80" cy="150" r="2" fill="#D4A843" opacity="0.5"/>
    <circle cx="17" cy="118" r="2" fill="#D4A843" opacity="0.5"/>
    <circle cx="17" cy="55" r="2" fill="#D4A843" opacity="0.5"/>

    <!-- Inner S shape -->
    <g filter="url(#depth)">
      <polygon points="103,37 133,52 123,64 98,50" fill="url(#pb)"/>
      <polygon points="98,50 123,64 113,85 88,70" fill="url(#pb)"/>
      <polygon points="88,70 113,85 103,108 78,93" fill="url(#pb)"/>
      <polygon points="78,93 103,108 82,130 60,115" fill="url(#pb)"/>
      <!-- Gold tip -->
      <polygon points="103,37 133,52 127,56 106,42" fill="url(#gm)" opacity="0.7"/>
    </g>
  </g>
</svg>