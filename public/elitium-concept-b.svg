<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="top" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <linearGradient id="right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="left" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8D48B"/>
      <stop offset="100%" stop-color="#7C6A1A"/>
    </linearGradient>
  </defs>

  <circle cx="100" cy="100" r="98" fill="#050510"/>

  <!-- CONCEPT B: Diamond/Gem — abstract E silhouette as a cut stone -->
  
  <!-- Top facet — white/silver -->
  <polygon points="100,15 165,55 100,70 35,55" fill="url(#top)"/>
  
  <!-- Right facet — blue -->
  <polygon points="165,55 165,130 100,155 100,70" fill="url(#right)"/>
  
  <!-- Left facet — gold -->
  <polygon points="35,55 100,70 100,155 35,130" fill="url(#left)"/>
  
  <!-- Bottom facet — dark blue -->
  <polygon points="35,130 100,155 165,130 100,185" fill="#0F1B3D"/>
  
  <!-- Inner facet lines — the "cuts" -->
  <line x1="100" y1="15" x2="100" y2="155" stroke="#FFFFFF" stroke-width="0.5" opacity="0.15"/>
  <line x1="35" y1="55" x2="165" y2="130" stroke="#FFFFFF" stroke-width="0.3" opacity="0.1"/>
  <line x1="165" y1="55" x2="35" y2="130" stroke="#FFFFFF" stroke-width="0.3" opacity="0.1"/>
  
  <!-- Top crown highlight -->
  <polygon points="100,15 130,40 100,50 70,40" fill="#FFFFFF" opacity="0.15"/>
  
  <!-- Edge highlights -->
  <line x1="100" y1="15" x2="165" y2="55" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="15" x2="35" y2="55" stroke="#FFFFFF" stroke-width="0.8" opacity="0.4"/>
  <line x1="100" y1="15" x2="100" y2="185" stroke="#FFFFFF" stroke-width="0.3" opacity="0.1"/>

  <!-- "E" carved into the gem via negative space -->
  <!-- Three horizontal cuts in the left facet -->
  <rect x="50" y="65" width="35" height="3" rx="1" fill="#050510" opacity="0.6"/>
  <rect x="50" y="90" width="28" height="3" rx="1" fill="#050510" opacity="0.6"/>
  <rect x="50" y="115" width="35" height="3" rx="1" fill="#050510" opacity="0.6"/>
  <!-- Vertical spine of E -->
  <rect x="48" y="63" width="3" height="57" rx="1" fill="#050510" opacity="0.6"/>

  <!-- Light reflection spot -->
  <circle cx="85" cy="40" r="4" fill="#FFFFFF" opacity="0.12"/>
</svg>