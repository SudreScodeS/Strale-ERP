<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#E8D48B"/>
      <stop offset="100%" stop-color="#B8922A"/>
    </linearGradient>
  </defs>

  <!-- Monogram E mark -->
  <g transform="translate(20, 18)">
    <polygon 
      points="75,0 140,37.5 140,112.5 75,150 10,112.5 10,37.5" 
      fill="none" 
      stroke="url(#gold)" 
      stroke-width="2.5" opacity="0.85"/>

    <g transform="translate(37, 25)">
      <rect x="0" y="0" width="15" height="100" rx="2" fill="url(#gold)"/>
      <rect x="0" y="0" width="60" height="13" rx="2" fill="url(#gold)"/>
      <rect x="0" y="43" width="46" height="13" rx="2" fill="url(#gold)"/>
      <rect x="0" y="87" width="60" height="13" rx="2" fill="url(#gold)"/>
      <line x1="50" y1="38" x2="65" y2="60" stroke="#0A0A0A" stroke-width="3.5" stroke-linecap="round"/>
    </g>

    <circle cx="75" cy="0" r="3" fill="url(#gold)" opacity="0.5"/>
    <circle cx="140" cy="37.5" r="3" fill="url(#gold)" opacity="0.5"/>
    <circle cx="140" cy="112.5" r="3" fill="url(#gold)" opacity="0.5"/>
    <circle cx="75" cy="150" r="3" fill="url(#gold)" opacity="0.5"/>
    <circle cx="10" cy="112.5" r="3" fill="url(#gold)" opacity="0.5"/>
    <circle cx="10" cy="37.5" r="3" fill="url(#gold)" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(185, 20)">
    <text x="0" y="78" 
      font-family="Liberation Sans, DejaVu Sans, Arial, Helvetica, sans-serif" 
      font-size="64" 
      font-weight="bold" 
      letter-spacing="10"
      fill="#E8E8E8">ELITIUM</text>

    <rect x="2" y="94" width="480" height="2" rx="1" fill="url(#gold)" opacity="0.5"/>

    <text x="3" y="120" 
      font-family="Liberation Sans, DejaVu Sans, Arial, Helvetica, sans-serif" 
      font-size="13" 
      font-weight="normal" 
      letter-spacing="4.5"
      fill="#686868">ENTERPRISE RESOURCE PLANNING</text>
  </g>
</svg>