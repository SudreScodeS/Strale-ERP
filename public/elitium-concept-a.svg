<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="b1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="b2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D060"/>
      <stop offset="100%" stop-color="#B8960B"/>
    </linearGradient>
  </defs>

  <circle cx="100" cy="100" r="98" fill="#050510"/>

  <!-- CONCEPT A: Bold angular E from stacked parallelograms -->
  <!-- Three strong diagonal bars forming a dynamic E -->
  
  <!-- Top bar — white, dramatic angle -->
  <polygon points="40,30 160,20 165,45 45,55" fill="#F0F4FF"/>
  <polygon points="45,55 165,45 160,52 40,62" fill="#CBD5E1" opacity="0.6"/>
  
  <!-- Middle bar — gold, offset angle -->
  <polygon points="40,78 130,72 135,95 45,101" fill="url(#g1)"/>
  <polygon points="45,101 135,95 130,102 40,108" fill="#8B6914" opacity="0.5"/>
  
  <!-- Bottom bar — blue, widest, strongest -->
  <polygon points="40,130 165,118 170,150 45,162" fill="url(#b1)"/>
  <polygon points="45,162 170,150 165,158 40,170" fill="#1E3A5F" opacity="0.5"/>

  <!-- Connecting spine — thin vertical -->
  <rect x="38" y="25" width="6" height="150" rx="1" fill="#F0D060" opacity="0.2"/>

  <!-- Diagonal slash accent -->
  <line x1="155" y1="15" x2="50" y2="175" stroke="#60A5FA" stroke-width="1.5" opacity="0.15"/>
  
  <!-- Corner sparks -->
  <circle cx="40" cy="30" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="40" cy="130" r="3" fill="#3B82F6" opacity="0.7"/>
  <circle cx="170" cy="150" r="2" fill="#60A5FA" opacity="0.4"/>
</svg>