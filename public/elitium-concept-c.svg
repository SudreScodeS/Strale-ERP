<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <linearGradient id="energy" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
  </defs>

  <circle cx="100" cy="100" r="98" fill="#050510"/>

  <!-- CONCEPT C: Aggressive angular shield/blade -->
  <!-- Abstract E formed by three angular blades radiating from left edge -->
  
  <!-- Main shape — three angular "blades" stacked -->
  
  <!-- Top blade — white, sharp -->
  <polygon points="30,20 170,15 175,30 160,50 35,55" fill="url(#blade)"/>
  <!-- Top blade shadow edge -->
  <polygon points="35,55 160,50 155,58 30,62" fill="#64748B" opacity="0.4"/>
  
  <!-- Middle blade — blue energy, with angular break -->
  <polygon points="30,75 100,70 108,68 115,72 108,82 115,85 155,78 160,90 155,105 115,110 108,105 100,108 30,112" fill="url(#energy)"/>
  
  <!-- Bottom blade — gold, strong anchor -->
  <polygon points="30,132 170,125 178,140 175,165 160,175 35,180 25,168 25,145" fill="#D4AF37"/>
  <polygon points="35,180 160,175 155,182 30,188" fill="#8B6914" opacity="0.4"/>
  
  <!-- Vertical connector — the spine of E -->
  <rect x="28" y="18" width="5" height="165" rx="1" fill="#D4AF37" opacity="0.15"/>
  
  <!-- Diagonal energy line -->
  <line x1="175" y1="10" x2="28" y2="185" stroke="#3B82F6" stroke-width="2" opacity="0.12" stroke-linecap="round"/>
  
  <!-- Edge sparks -->
  <circle cx="30" cy="20" r="3" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="170" cy="125" r="2.5" fill="#D4AF37" opacity="0.5"/>
  <circle cx="178" cy="140" r="2" fill="#D4AF37" opacity="0.3"/>
  <circle cx="30" cy="132" r="2" fill="#3B82F6" opacity="0.4"/>

  <!-- Energy particles -->
  <circle cx="90" cy="40" r="1.2" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="120" cy="95" r="1" fill="#60A5FA" opacity="0.25"/>
  <circle cx="80" cy="155" r="1.5" fill="#D4AF37" opacity="0.2"/>
</svg>