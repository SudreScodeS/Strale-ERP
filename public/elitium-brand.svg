<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <!-- Metallic gold gradient -->
    <linearGradient id="goldMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D6B065"/>
      <stop offset="50%" stop-color="#C99A3E"/>
      <stop offset="100%" stop-color="#A17823"/>
    </linearGradient>
    <!-- Deep purple gradient -->
    <linearGradient id="purpleDeep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A3085"/>
      <stop offset="50%" stop-color="#4B2673"/>
      <stop offset="100%" stop-color="#3D1E5E"/>
    </linearGradient>
    <!-- Bright purple for inner S -->
    <linearGradient id="purpleBright" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6A3D9A"/>
      <stop offset="100%" stop-color="#3D1E5E"/>
    </linearGradient>
    <!-- Glow effect -->
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9933FF" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#9933FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#9933FF" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow filter -->
    <filter id="shadow3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="4" stdDeviation="8" flood-color="#2A1540" flood-opacity="0.55"/>
    </filter>
    <!-- Text bevel highlight -->
    <filter id="textBevel" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.5" flood-color="#D3D3D3" flood-opacity="0.5"/>
      <feDropShadow dx="0" dy="-1" stdDeviation="0.5" flood-color="#707070" flood-opacity="0.3"/>
    </filter>
    <!-- Mark inner shadow -->
    <filter id="innerDepth" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#1A0A2E" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="#F0EFE9"/>
  <!-- Subtle marble texture lines -->
  <g opacity="0.12">
    <path d="M0,80 Q200,60 400,90 T800,70" fill="none" stroke="#E2E1DD" stroke-width="1"/>
    <path d="M0,160 Q300,140 500,170 T800,150" fill="none" stroke="#E2E1DD" stroke-width="0.8"/>
    <path d="M0,240 Q150,260 350,230 T800,250" fill="none" stroke="#E2E1DD" stroke-width="0.6"/>
    <path d="M0,320 Q250,300 450,330 T800,310" fill="none" stroke="#E2E1DD" stroke-width="0.7"/>
  </g>

  <!-- Purple glow beneath the mark -->
  <ellipse cx="200" cy="200" rx="150" ry="120" fill="url(#glowPurple)"/>

  <!-- 3D MARK GROUP -->
  <g filter="url(#shadow3d)" transform="translate(80, 60)">
    
    <!-- OUTER HEXAGON FRAME - 4 segments -->
    <!-- Hexagon center: 120,140. Size: ~130px radius -->
    
    <!-- Segment 1: Top-left (purple) -->
    <polygon points="120,10 230,65 200,110 120,80" fill="url(#purpleDeep)" filter="url(#innerDepth)"/>
    <!-- Segment 2: Bottom-left (purple) -->
    <polygon points="120,80 200,110 200,200 120,230 10,175" fill="url(#purpleDeep)" filter="url(#innerDepth)"/>
    <!-- Segment 3: Bottom-right (purple) -->
    <polygon points="200,110 230,65 230,175 200,200" fill="url(#purpleDeep)" filter="url(#innerDepth)"/>
    <!-- Segment 4: Top-right (gold) -->
    <polygon points="120,10 10,65 10,175 120,80" fill="url(#goldMetal)" filter="url(#innerDepth)"/>

    <!-- Segment gap lines (dark separators) -->
    <line x1="120" y1="10" x2="120" y2="80" stroke="#1A0A2E" stroke-width="2.5"/>
    <line x1="120" y1="80" x2="200" y2="110" stroke="#1A0A2E" stroke-width="2.5"/>
    <line x1="200" y1="110" x2="200" y2="200" stroke="#1A0A2E" stroke-width="2"/>

    <!-- MIDDLE HEXAGON OUTLINE (thin frame inside) -->
    <polygon points="120,30 215,77 215,167 120,215 25,167 25,77" 
      fill="none" stroke="#D4A843" stroke-width="1.5" opacity="0.6"/>

    <!-- Rivet dots at hexagon vertices -->
    <circle cx="120" cy="30" r="2.5" fill="#D4A843" opacity="0.7"/>
    <circle cx="215" cy="77" r="2.5" fill="#D4A843" opacity="0.7"/>
    <circle cx="215" cy="167" r="2.5" fill="#D4A843" opacity="0.7"/>
    <circle cx="120" cy="215" r="2.5" fill="#D4A843" opacity="0.7"/>
    <circle cx="25" cy="167" r="2.5" fill="#D4A843" opacity="0.7"/>
    <circle cx="25" cy="77" r="2.5" fill="#D4A843" opacity="0.7"/>

    <!-- INNER STYLIZED S/LOOP -->
    <!-- Angular S with 120° bends, matching hexagon geometry -->
    <g filter="url(#innerDepth)">
      <!-- S shape: starts top-right, curves through middle, ends bottom-left -->
      <!-- Top arm of S -->
      <polygon points="155,55 200,77 185,95 145,75" fill="url(#purpleBright)"/>
      <!-- Middle connecting bar -->
      <polygon points="145,75 185,95 170,125 130,105" fill="url(#purpleBright)"/>
      <!-- Middle to bottom transition -->
      <polygon points="130,105 170,125 155,155 115,135" fill="url(#purpleBright)"/>
      <!-- Bottom arm of S -->
      <polygon points="115,135 155,155 120,185 85,165" fill="url(#purpleBright)"/>
      
      <!-- Gold accent on top-right tip of S -->
      <polygon points="155,55 200,77 190,82 158,62" fill="url(#goldMetal)" opacity="0.8"/>
      
      <!-- Highlight edges -->
      <line x1="155" y1="55" x2="200" y2="77" stroke="#8B6FC0" stroke-width="0.8" opacity="0.6"/>
      <line x1="145" y1="75" x2="185" y2="95" stroke="#8B6FC0" stroke-width="0.6" opacity="0.4"/>
    </g>
  </g>

  <!-- TYPOGRAPHY -->
  <g transform="translate(400, 120)">
    <!-- ELITIUM -->
    <text x="0" y="70" 
      font-family="Montserrat, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
      font-size="72" 
      font-weight="700" 
      letter-spacing="8"
      fill="#999999"
      filter="url(#textBevel)">ELITIUM</text>
    
    <!-- ERP -->
    <text x="5" y="120" 
      font-family="Montserrat, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
      font-size="40" 
      font-weight="600" 
      letter-spacing="12"
      fill="#606060"
      filter="url(#textBevel)">ERP</text>
  </g>
</svg>